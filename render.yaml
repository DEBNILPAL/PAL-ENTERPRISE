services:
  - type: web
    name: pal-enterprise-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-netlify-app.netlify.app
      # PostgreSQL (optional - uncomment when ready)
      # - key: PG_HOST
      #   value: your-pg-host
      # - key: PG_PORT
      #   value: 5432
      # - key: PG_USER
      #   value: your-pg-user
      # - key: PG_PASSWORD
      #   value: your-pg-password
      # - key: PG_DATABASE
      #   value: pal_enterprise
    healthCheckPath: /
    autoDeploy: true
