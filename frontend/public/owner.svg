<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 550" width="400" height="550">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="550" fill="url(#bg)" rx="16"/>
  <!-- Body/Suit -->
  <ellipse cx="200" cy="520" rx="160" ry="100" fill="url(#suit)"/>
  <!-- Shirt collar -->
  <polygon points="170,420 200,480 230,420" fill="#fff"/>
  <!-- Tie -->
  <polygon points="192,430 200,510 208,430" fill="#7b2d54"/>
  <polygon points="195,430 200,440 205,430" fill="#9b3d6a"/>
  <!-- Head -->
  <ellipse cx="200" cy="280" rx="80" ry="100" fill="#c4956a"/>
  <!-- Hair -->
  <ellipse cx="200" cy="210" rx="82" ry="50" fill="#1a1a2e"/>
  <rect x="118" y="210" width="164" height="30" fill="#1a1a2e" rx="4"/>
  <!-- Eyes -->
  <ellipse cx="175" cy="285" rx="12" ry="8" fill="#fff"/>
  <ellipse cx="225" cy="285" rx="12" ry="8" fill="#fff"/>
  <circle cx="175" cy="285" r="5" fill="#2d1810"/>
  <circle cx="225" cy="285" r="5" fill="#2d1810"/>
  <!-- Glasses -->
  <rect x="155" y="273" width="40" height="26" rx="4" fill="none" stroke="#555" stroke-width="2.5"/>
  <rect x="205" y="273" width="40" height="26" rx="4" fill="none" stroke="#555" stroke-width="2.5"/>
  <line x1="195" y1="286" x2="205" y2="286" stroke="#555" stroke-width="2"/>
  <line x1="155" y1="286" x2="140" y2="282" stroke="#555" stroke-width="2"/>
  <line x1="245" y1="286" x2="260" y2="282" stroke="#555" stroke-width="2"/>
  <!-- Nose -->
  <path d="M200,290 Q195,310 190,318 Q200,322 210,318 Q205,310 200,290" fill="#b8855a" opacity="0.5"/>
  <!-- Mouth -->
  <path d="M185,335 Q200,345 215,335" fill="none" stroke="#8b5a3a" stroke-width="2"/>
  <!-- Ears -->
  <ellipse cx="120" cy="285" rx="12" ry="20" fill="#c4956a"/>
  <ellipse cx="280" cy="285" rx="12" ry="20" fill="#c4956a"/>
  <!-- Name -->
  <text x="200" y="540" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#a0aec0" font-weight="bold">WHOLESALE OWNER</text>
</svg>
